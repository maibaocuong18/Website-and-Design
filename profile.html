<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Noir Fashion | Profile</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg sticky-top fade-in">
      <div class="container">
        <a class="navbar-brand" href="index.html">NOIR</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav ms-auto gap-lg-2">
            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
            <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
            <li class="nav-item"><a class="nav-link" href="register.html">Register</a></li>
            <li class="nav-item"><a class="nav-link active" href="profile.html">Profile</a></li>
            <li class="nav-item"><a class="nav-link" href="cart.html">Cart</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container py-5">
      <div class="row g-4">
        <div class="col-lg-4 slide-up">
          <div class="soft-card p-4 text-center h-100">
            <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=400&auto=format&fit=crop" alt="Profile avatar" class="rounded-circle mb-3" style="width: 140px; height: 140px; object-fit: cover;" />
            <h3 class="h4 mb-1" data-profile-name>Mai Bảo Cường</h3>
            <p class="text-muted mb-4">Premium Member</p>
            <button class="btn btn-outline-noir w-100">Edit Profile</button>
          </div>
        </div>
        <div class="col-lg-8 slide-up">
          <div class="soft-card p-4 p-lg-5 mb-4">
            <h2 class="h4 mb-4">Account Details</h2>
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Full Name</label>
                <input class="form-control rounded-0" value="Mai Bảo Cường" readonly />
              </div>
              <div class="col-md-6">
                <label class="form-label">Email</label>
                <input class="form-control rounded-0" data-profile-email value="mai.baocuong@gmail.com" readonly />
              </div>
              <div class="col-md-6">
                <label class="form-label">Phone</label>
                <input class="form-control rounded-0" value="+84 912 345 678" readonly />
              </div>
              <div class="col-md-6">
                <label class="form-label">Address</label>
                <input class="form-control rounded-0" value="Quận 1, TP. Hồ Chí Minh, Việt Nam" readonly />
              </div>
            </div>
          </div>
          <div class="soft-card p-4 p-lg-5">
            <h2 class="h4 mb-3">Recent Orders</h2>
            <ul class="list-group list-group-flush">
              <li class="list-group-item d-flex justify-content-between align-items-center px-0">Order #1024 - Classic Black Suit <span class="badge text-bg-dark rounded-0">Delivered</span></li>
              <li class="list-group-item d-flex justify-content-between align-items-center px-0">Order #1031 - Urban Gray Coat <span class="badge text-bg-secondary rounded-0">In Transit</span></li>
            </ul>
          </div>
        </div>
      </div>
    </main>

    <footer class="py-4 bg-white text-center">
      <p class="mb-0">&copy; 2026 Noir Fashion. All rights reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
