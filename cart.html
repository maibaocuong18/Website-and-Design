<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Noir Fashion | Cart</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg sticky-top fade-in">
      <div class="container">
        <a class="navbar-brand" href="index.html">NOIR</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav ms-auto gap-lg-2">
            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
            <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
            <li class="nav-item"><a class="nav-link" href="register.html">Register</a></li>
            <li class="nav-item"><a class="nav-link" href="profile.html">Profile</a></li>
            <li class="nav-item"><a class="nav-link active" href="cart.html">Cart</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container py-5">
      <h1 class="h2 mb-4 slide-up">Your Cart</h1>
      <div class="row g-4">
        <div class="col-lg-8 slide-up">
          <div class="table-responsive soft-card p-2">
            <table class="table align-middle table-noir mb-0">
              <thead>
                <tr>
                  <th>Product</th>
                  <th>Price</th>
                  <th>Qty</th>
                  <th>Total</th>
                  <th></th>
                </tr>
              </thead>
              <tbody data-cart-body>
                <tr data-cart-row data-price="299">
                  <td>Classic Black Suit</td>
                  <td>$299.00</td>
                  <td><input type="number" class="form-control rounded-0" data-qty value="1" min="1" style="max-width: 90px;" /></td>
                  <td data-line-total>$299.00</td>
                  <td><button class="btn btn-sm btn-outline-noir" data-remove>Remove</button></td>
                </tr>
                <tr data-cart-row data-price="159">
                  <td>Minimal White Dress</td>
                  <td>$159.00</td>
                  <td><input type="number" class="form-control rounded-0" data-qty value="1" min="1" style="max-width: 90px;" /></td>
                  <td data-line-total>$159.00</td>
                  <td><button class="btn btn-sm btn-outline-noir" data-remove>Remove</button></td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
        <div class="col-lg-4 slide-up">
          <div class="soft-card p-4">
            <h2 class="h5 mb-3">Order Summary</h2>
            <div class="d-flex justify-content-between mb-2"><span>Subtotal</span><strong data-subtotal>$0.00</strong></div>
            <div class="d-flex justify-content-between mb-3"><span>Shipping</span><strong>Free</strong></div>
            <hr />
            <div class="d-flex justify-content-between mb-4"><span>Total</span><strong data-total>$0.00</strong></div>
            <button class="btn btn-noir w-100">Proceed to Checkout</button>
          </div>
        </div>
      </div>
    </main>

    <footer class="py-4 bg-white text-center">
      <p class="mb-0">&copy; 2026 Noir Fashion. All rights reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
