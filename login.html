<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Noir Fashion | Login</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg sticky-top fade-in">
      <div class="container">
        <a class="navbar-brand" href="index.html">NOIR</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav ms-auto gap-lg-2">
            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
            <li class="nav-item"><a class="nav-link active" href="login.html">Login</a></li>
            <li class="nav-item"><a class="nav-link" href="register.html">Register</a></li>
            <li class="nav-item"><a class="nav-link" href="profile.html">Profile</a></li>
            <li class="nav-item"><a class="nav-link" href="cart.html">Cart</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-7 col-lg-5 slide-up">
          <div class="soft-card p-4 p-lg-5">
            <h1 class="h2 text-center mb-4">Login to Noir</h1>
            <form class="needs-validation" novalidate data-auth-mode="login" data-success-message="Login validated successfully.">
              <div class="mb-3">
                <label for="loginEmail" class="form-label">Email</label>
                <input id="loginEmail" type="email" class="form-control rounded-0" required />
                <div class="invalid-feedback">Email is required.</div>
              </div>
              <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input id="password" type="password" class="form-control rounded-0" required />
                <div class="invalid-feedback">Password is required.</div>
              </div>
              <div class="d-flex justify-content-between mb-4">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" value="" id="rememberMe" />
                  <label class="form-check-label" for="rememberMe">Remember me</label>
                </div>
                <span class="text-muted small">Secure sign-in enabled</span>
              </div>
              <button class="btn btn-noir w-100" type="submit">Login</button>
              <div class="message-box" data-form-message></div>
              <p class="text-center mt-3 mb-0">
                New here? <a href="register.html" class="text-dark">Create an account</a>
              </p>
            </form>
          </div>
        </div>
      </div>
    </main>

    <footer class="py-4 bg-white text-center">
      <p class="mb-0">&copy; 2026 Noir Fashion. All rights reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
